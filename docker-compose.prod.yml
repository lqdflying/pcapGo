# =============================================================================
# SAMPLE template — kept in the source repo. Do NOT fill this with production
# secrets or run it in place. This file and .env.sample are the templates you
# copy into a dedicated deployment directory on the host.
#
# Deploy workflow (1Panel or direct host):
#   1. Clone/update this repo to get the latest samples + Dockerfile.
#   2. Create a deployment directory elsewhere on the host, e.g. ~/pcapgo-deploy.
#   3. Copy the samples in:
#        cp docker-compose.prod.yml ~/pcapgo-deploy/docker-compose.yml
#        cp .env.sample             ~/pcapgo-deploy/.env
#   4. In ~/pcapgo-deploy/docker-compose.yml, point build.context at this repo
#      (or pre-build an image and switch the service to `image:`).
#   5. Fill ~/pcapgo-deploy/.env with real values (secrets, DB, domain).
#   6. cd ~/pcapgo-deploy && docker compose up -d --build
#
# 1Panel alternative: paste this file's contents + your .env into 1Panel's
# Compose editor (see the 1Panel section of the Deployment guide).
# =============================================================================
# All container configuration is injected from .env via the env_file directive
# — there are no per-variable environment entries or hardcoded defaults here.
# The same .env is also auto-read by Compose for ${VAR} interpolation, which is
# how ${WEB_PORT} in the port mapping below resolves. If .env is missing,
# Compose fails fast with a clear error.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "${WEB_PORT}:8000"
    volumes:
      - uploads:/app/uploads

volumes:
  uploads:
